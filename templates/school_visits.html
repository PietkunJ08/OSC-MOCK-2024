{% extends 'layout.html' %}

{% block content %}
<div class="main-bg-img" role="img">
    <main role="main">
        <h1>Book a School Visit</h1>
        <p>Prices are per student (not inluding £10 for the supervisor or for each supervisor).</p>
        <div id="center-content">
            <form method="post">
                <label for="school">School:</label>
                <input type="text" id="school" name="school"><br><br>
                <label for="supervisor-name">Supervisor Name:</label>
                <input type="text" id="supervisor-name" name="supervisor-name"><br><br>
                <label for="supervisor-email">Supervisor Email:</label>
                <input type="text" id="supervisor-email" name="supervisor-email"><br><br>
                <label for="supervisor-number">Supervisor Number:</label>
                <input type="text" id="supervisor-number" name="supervisor-number"><br><br>
                <label for="visit-type">Visit Type:</label>
                <select id="visit-type" name="visit-type">
                    <option value="zoo-visit" selected>Zoo Visit (£9)</option>
                    <option value="safari-ride">Safari Ride (£8)</option>
                    <option value="zoo-visit-safari-ride">Zoo Visit + Safari Ride (£16)</option>
                </select><br><br>
                <label for="children">Children:</label>
                <input type="number" id="children" min="10" step="1" max="100" name="children"><br><br>
                <button type="submit">Book</button>
            </form>
        </div>
    </main>
</div>
{% endblock %}
