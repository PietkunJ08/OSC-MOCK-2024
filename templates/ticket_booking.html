{% extends 'layout.html' %}

{% block content %}
<div class="main-bg-img" role="img">
    <main role="main">
        <h1>Ticket Booking</h1>
        <div id="center-content">
            <p>You must select at least 1 adult, student, senior, or family ticket. You cannot exceed the 20 person limit (family tickets count as 4 persons).</p>
            <form method="post">
                <label for="ticket-type">Ticket Type:</label>
                <select id="ticket-type" name="ticket-type" required>
                    <option value="peak" selected>Peak</option>
                    <option value="off-peak">Off-Peak</option>
                </select><br><br>
                <label for="adult-tickets">Adult Tickets (£20):</label>
                <input type="number" id="adult-tickets" name="adult-tickets" min="0" step="1" value="0" max="20" required><br><br>
                <label for="child-tickets">Child Tickets (£10):</label>
                <input type="number" id="child-tickets" name="child-tickets" min="0" step="1" value="0" max="19" required><br><br>
                <label for="student-tickets">Student Tickets (£17.50):</label>
                <input type="number" id="student-tickets" name="student-tickets" min="0" step="1" value="0" max="20" required><br><br>
                <label for="senior-tickets">Senior Tickets (£15):</label>
                <input type="number" id="senior-tickets" name="senior-tickets" min="0" step="1" value="0" max="20" required><br><br>
                <label for="family-tickets">Family Tickets (£52):</label>
                <input type="number" id="family-tickets" name="family-tickets" min="0" step="1" value="0" max="5" required><br><br>
                <button type="submit">Book</button>
            </form>
        </div>
    </main>
</div>
{% endblock %}
