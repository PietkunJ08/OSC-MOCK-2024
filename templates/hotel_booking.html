{% extends 'layout.html' %}

{% block content %}
<div class="main-bg-img" role="img">
    <main role="main">
        <h1>Hotel Booking</h1>
        <div id="center-content">
            <p>There must be at least 1 adult staying at the hotel. You cannot exceed the 20 person limit.</p>
            <p>Prices are per room.</p>
            <form method="post">
                <label for="adults">Adults:</label>
                <input type="number" id="adults" name="adults" min="1" step="1" value="1" max="20" required><br><br>
                <label for="children">Children:</label>
                <input type="number" id="children" name="children" min="0" step="1" value="0" max="19" required><br><br>
                <label for="room-type">Room Type:</label>
                <select id="room-type" name="room-type">
                    <option value="standard" selected>Standard (£25)</option>
                    <option value="premium">Premium (£50)</option>
                    <option value="luxury">Luxury (£75)</option>
                    <option value="ultimate">Ultimate (£100)</option>
                </select><br><br>
                <label for="rooms">Rooms:</label>
                <input type="number" id="rooms" name="rooms" min="1" step="1" value="1" max="5" required><br><br>
                <button type="submit">Book</button>
            </form>
        </div>
    </main>
</div>
{% endblock %}
